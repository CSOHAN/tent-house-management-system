<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THMS Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">
            Sri Lakshmi Shamiyana - THMS
        </span>

        <span class="text-white">
            Welcome Admin
        </span>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-5">
        Sri Lakshmi Shamiyana
        <br>
        Tent House Management System
    </h1>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card text-center shadow p-3">
                <div class="card-body">
                    <i class="bi bi-people-fill display-4 text-primary"></i>

                    <h4 class="mt-3">Customers</h4>

                    <h1 id="customerCount">0</h1>

                    <a href="customers.html"
                       class="btn btn-primary">
                        Open
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow p-3">
                <div class="card-body">
                    <i class="bi bi-calendar-event display-4 text-success"></i>

                    <h4 class="mt-3">Bookings</h4>

                    <h1 id="bookingCount">0</h1>

                    <a href="bookings.html"
                       class="btn btn-success">
                        Open
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow p-3">
                <div class="card-body">
                    <i class="bi bi-box-seam display-4 text-warning"></i>

                    <h4 class="mt-3">Inventory</h4>

                    <h1>0</h1>

                    <button class="btn btn-warning" disabled>
                        Coming Soon
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow p-3">
                <div class="card-body">
                    <i class="bi bi-arrow-return-left display-4 text-danger"></i>

                    <h4 class="mt-3">Returns</h4>

                    <h1>0</h1>

                    <button class="btn btn-danger" disabled>
                        Coming Soon
                    </button>
                </div>
            </div>
        </div>

    </div>

</div>

<footer class="text-center mt-5 mb-3 text-muted">
    © 2026 Sri Lakshmi Shamiyana - Tent House Management System
</footer>

<script src="js/dashboard.js"></script>

</body>
</html>
